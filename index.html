<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modelo 3D</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background: transparent;
    }
  </style>
</head>
<body>

  <model-viewer
    alt="Prueba de AR"
    src="gorrawebhtml.glb"
    environment-image="entorno.hdr"
    poster="porweb.png"
    ar
    shadow-intensity="1"
    camera-controls
    touch-action="pan-y">
  </model-viewer>

</body>
</html>
